          - heading "Como usar o conversor com mais inteligência" [level=2] [ref=f72e204]
          - paragraph [ref=f72e205]: A cotação comercial ajuda a acompanhar o mercado, mas a decisão prática exige olhar também para IOF, spread, tempo da operação e o objetivo do gasto. Por isso, o conversor agora vai além do valor bruto e aproxima o cálculo do custo real em reais.
          - paragraph [ref=f72e206]: Se a operação for para viagem, a calculadora complementar ajuda a comparar cenários com mais contexto. Se for para remessa, o ideal é combinar a simulação com uma comparação entre parceiros e prazo de liquidação.
