services:
  app:
    build: .
    ports:
      - "${APP_PORT:-10002}:3000"
    environment:
      DATABASE_HOST: "${DATABASE_HOST:-db}"
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DATABASE_NAME: "${DATABASE_NAME:-horaja}"
      DATABASE_USER: "${DATABASE_USER:-horaja}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD}"
      ALPHA_VANTAGE_API_KEY: "${ALPHA_VANTAGE_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      ADMIN_SECRET: "${ADMIN_SECRET}"
      PIPELINE_SECRET: "${PIPELINE_SECRET}"
      AWESOMEAPI_KEY: "${AWESOMEAPI_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-horaja}
      POSTGRES_USER: ${DATABASE_USER:-horaja}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-horaja} -d ${DATABASE_NAME:-horaja}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
